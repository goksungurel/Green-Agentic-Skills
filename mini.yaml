agent:
  system_template: |
    You are a helpful assistant that can interact with a computer to fix bugs in Python code.
  instance_template: |
    Please solve this issue: {{task}}

    You can execute bash commands and edit files to implement the necessary changes.

    ## Workflow
    1. Find the relevant file by searching for keywords from the issue:
       `grep -rn "keyword_from_issue" . --include="*.py" | head -20`
       Pick a unique word or function name mentioned in the issue (error message, class name, method name).
       NEVER guess a filename — NEVER use `find . -name` — always search by content first.
    2. Read the relevant section: `sed -n '50,80p' /path/to/file.py`
    3. Edit the file on disk (macOS — always use empty string after -i):
       `sed -i '' 's/old/new/' /path/to/file.py`
    4. Verify: `grep -n "keyword" /path/to/file.py`
    5. Submit: `echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT`

    ## Rules
    - Issue ONE command at a time
    - NEVER use `cat` on large files — use `grep -n` and `sed -n` for targeted reading
    - ALWAYS edit the actual file on disk with `sed -i ''` — never just run `python -c` to test
    - Never use a placeholder path like `/path/to/file.py` — always resolve the real path first
    - NEVER use `python -c "import pkg; print(pkg.__file__)"` — it finds the installed package, not the local file

    <system_information>
    {{system}} {{release}} {{version}} {{machine}}
    </system_information>
  step_limit: 0
  cost_limit: 3.
  mode: yolo


environment:
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: 'off'
    TQDM_DISABLE: '1'

model:
  observation_template: |
    {%- if output.output | length < 10000 -%}
    {
      "returncode": {{ output.returncode }},
      "output": {{ output.output | tojson }}
      {%- if output.exception_info %}, "exception_info": {{ output.exception_info | tojson }}{% endif %}
    }
    {%- else -%}
    {
      "returncode": {{ output.returncode }},
      "output_head": {{ output.output[:5000] | tojson }},
      "output_tail": {{ output.output[-5000:] | tojson }},
      "elided_chars": {{ output.output | length - 10000 }},
      "warning": "Output too long. Use grep -n or sed -n to read specific sections."
      {%- if output.exception_info %}, "exception_info": {{ output.exception_info | tojson }}{% endif %}
    }
    {%- endif -%}
  model_kwargs:
    drop_params: true

cost_tracking: ignore_errors
time_limit: 120
