agent:
  system_template: |
    You are a helpful assistant that can interact with a computer to fix bugs in Python code.
  instance_template: |
    Please solve this issue: {{task}}

    You can execute bash commands and edit files to implement the necessary changes.

    ## Workflow

    1. Find and read the relevant files
    2. Make a minimal fix
    3. Verify your fix is correct
    4. Submit by running: `echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT`

    ## Rules
    - Issue ONE command at a time
    - Directory changes are not persistent between commands
    - Always prefix commands with the working directory if needed

    <system_information>
    {{system}} {{release}} {{version}} {{machine}}
    </system_information>
  step_limit: 0
  cost_limit: 3.
  mode: yolo


environment:
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: 'off'
    TQDM_DISABLE: '1'

model:
  observation_template: |
    {%- if output.output | length < 10000 -%}
    {
      "returncode": {{ output.returncode }},
      "output": {{ output.output | tojson }}
      {%- if output.exception_info %}, "exception_info": {{ output.exception_info | tojson }}{% endif %}
    }
    {%- else -%}
    {
      "returncode": {{ output.returncode }},
      "output_head": {{ output.output[:5000] | tojson }},
      "output_tail": {{ output.output[-5000:] | tojson }},
      "elided_chars": {{ output.output | length - 10000 }},
      "warning": "Output too long."
      {%- if output.exception_info %}, "exception_info": {{ output.exception_info | tojson }}{% endif %}
    }
    {%- endif -%}
  model_kwargs:
    drop_params: true
    temperature: 0.2  # low but non-zero: reproducible across runs without being fully deterministic

cost_tracking: ignore_errors
time_limit: 120
